<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" id="favicon" href="/favicon.png" type="image/png" />
    <script>
      // Theme-aware favicon: dark favicon for light mode, light favicon for dark mode
      (function () {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function setFav(e) {
          document.getElementById('favicon').href = e.matches
            ? '/favicon-light.png'
            : '/favicon-dark.png';
        }
        setFav(mq);
        mq.addEventListener('change', setFav);
      })();
    </script>
    <title>Celune — Design-Led Digital Studio</title>
    <meta
      name="description"
      content="Design-led digital studio building thoughtful products and experiences."
    />
    <link rel="canonical" href="https://smejkal.co/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Zalando+Sans+Expanded:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smejkal.co/" />
    <meta property="og:title" content="Celune — Design-Led Digital Studio" />
    <meta
      property="og:description"
      content="Design-led digital studio building thoughtful products and experiences."
    />
    <meta property="og:image" content="https://smejkal.co/og-image.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Celune — Design-Led Digital Studio" />
    <meta
      name="twitter:description"
      content="Design-led digital studio building thoughtful products and experiences."
    />
    <meta name="twitter:image" content="https://smejkal.co/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
